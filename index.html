<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safe JSON.stringify monkey-patch to prevent circular and DOM node serialization crashes
      (function() {
        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          const seen = new WeakSet();
          function safeReplacer(key, val) {
            if (val instanceof Node || (typeof val === 'object' && val !== null && val.nodeType !== undefined)) {
              return "[DOMNode]";
            }
            if (typeof val === "object" && val !== null) {
              if (seen.has(val)) {
                return "[Circular]";
              }
              seen.add(val);
            }
            if (replacer) {
              return replacer(key, val);
            }
            return val;
          }
          try {
            return originalStringify(value, replacer || safeReplacer, space);
          } catch (e) {
            try {
              return originalStringify(value, safeReplacer, space);
            } catch (innerErr) {
              return '"[Unserializable]"';
            }
          }
        };
      })();
    </script>
    <script>
      (function() {
        // Prevent third-party tracking scripts from running and causing crashes inside local development and sandboxed Cloud Run environments
        const hostname = window.location.hostname;
        const isSandbox = hostname === "localhost" || hostname === "127.0.0.1" || hostname.includes("run.app") || hostname.includes("aistudio");
        
        if (!isSandbox) {
          window.pixelId = "6a32006128c43ac3a0e875b5";
          var a = document.createElement("script");
          a.setAttribute("async", "");
          a.setAttribute("defer", "");
          a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
          document.head.appendChild(a);

          var b = document.createElement("script");
          b.setAttribute("async", "");
          b.setAttribute("defer", "");
          b.setAttribute("src", "https://cdn.utmify.com.br/scripts/utms/latest.js");
          b.setAttribute("data-utmify-prevent-xcod-sck", "");
          b.setAttribute("data-utmify-prevent-subids", "");
          document.head.appendChild(b);
        } else {
          console.log("[UTMify] Tracking scripts bypassed in local/sandbox container to prevent runtime '_id' errors.");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
