    <script>
      // Safe JSON.stringify monkey-patch to prevent circular and DOM node serialization crashes
      (function() {
        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          const seen = new WeakSet();
          function safeReplacer(key, val) {
            if (val instanceof Node || (typeof val === 'object' && val !== null && val.nodeType !== undefined)) {
              return "[DOMNode]";
            }
            if (typeof val === "object" && val !== null) {
              if (seen.has(val)) {
                return "[Circular]";
              }
              seen.add(val);
            }
            if (replacer) {
              return replacer(key, val);
            }
            return val;
          }
          try {
            return originalStringify(value, replacer || safeReplacer, space);
          } catch (e) {
            try {
              return originalStringify(value, safeReplacer, space);
            } catch (innerErr) {
              return '"[Unserializable]"';
            }
          }
        };
      })();
    </script>
